apiVersion: v1
kind: ServiceAccount
metadata:
  name: polaris-pipeline
  namespace: polaris-pipeline
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: polaris-pipeline-role
  namespace: polaris-pipeline
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "secrets", "configmaps", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: polaris-pipeline-rolebinding
  namespace: polaris-pipeline
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: polaris-pipeline-role
subjects:
  - kind: ServiceAccount
    name: polaris-pipeline
    namespace: polaris-pipeline
